[MAIN]
# Стабільна конфігурація для GPU (вирішує проблему NaN loss)
nEpochs = 50
nBatchSize = 32
nPatience = 5
nKFolds = 5
bCategorical = false
sDevice = gpu

# Параметри стабільності для GPU
fLearningRate = 0.0005  # Консервативний learning rate
bGradientClipping = true

# Примітка: Ці налаштування допомагають уникнути NaN loss на GPU
# - Менший learning rate запобігає gradient explosion
# - Gradient clipping обмежує великі градієнти
# - Збільшений epsilon в Adam оптимізаторі для числової стабільності